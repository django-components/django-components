# This library strives to support all officially supported combinations of Python and Django:
# https://docs.djangoproject.com/en/5.2/faq/install/#what-python-version-can-i-use-with-django
# https://devguide.python.org/versions/#versions

[tox]
requires =
  tox>=4
  tox-uv>=1  # Use uv for dependency management
  tox-gh-actions>=3  # Run only those envs as set in [gh-actions]

envlist =
  py310-django{52}
  py311-django{52}
  py312-django{52,60}
  py{313,314}-django{52,60}
  e2e
  benchmark_snapshot
  ruff
  coverage
  mypy

[gh-actions]
python =
  3.10: py310-django{52}
  3.11: py311-django{52}
  3.12: py312-django{52,60}
  3.13: py313-django{52,60}
  3.14: py314-django{52,60}

isolated_build = true

[testenv]
package = wheel
wheel_build_env = .pkg
deps =
  django52: Django>=5.2,<5.3
  django60: Django>=6.0,<6.1
  djc-core==1.3.0
  pytest
  pytest-xdist
  pytest-django
  pytest-asyncio
  syrupy  # pytest snapshot testing
  # NOTE: Keep playwright version in sync with the ci dependency group in pyproject.toml
  # Otherwise we get error:
  # playwright._impl._errors.Error: BrowserType.launch: Executable doesn't exist at /home/runner/.cache/ms-playwright/chromium-1140/chrome-linux/chrome
  playwright==1.57.0
  pydantic
  requests
  types-requests
  whitenoise
  # NOTE: Delete when Django 5.2 reaches end of life
  django-template-partials
commands =
  pytest -n auto -m "not e2e and not benchmark_snapshot" --ignore=tests/test_templatetags_provide.py {posargs}
  pytest -m "not e2e and not benchmark_snapshot" tests/test_templatetags_provide.py {posargs}

[testenv:benchmark_snapshot]
commands = pytest -m benchmark_snapshot {posargs}

[testenv:e2e]
package = wheel
wheel_build_env = .pkg
deps =
  Django>=5.2,<5.3
  djc-core==1.3.0
  pytest
  pytest-django
  pytest-asyncio
  playwright==1.57.0
  pydantic
  requests
  types-requests
  whitenoise
set_env =
  DJC_TEST_BROWSERS = chromium
commands = pytest -m e2e {posargs}

[testenv:ruff]
deps = ruff
commands =
    ruff check .
    ruff format --check .

[testenv:coverage]
deps =
  pytest-cov
  pytest-django
  pytest-asyncio
  syrupy  # snapshot testing
  # NOTE: Keep playwright version in sync with the ci dependency group in pyproject.toml
  playwright==1.57.0
  pydantic
  requests
  types-requests
  whitenoise
commands =
  pytest -m "not e2e and not benchmark_snapshot" --cov=django_components --cov-fail-under=75 --cov-branch

[testenv:mypy]
deps =
  mypy
  types-requests
commands = mypy .
